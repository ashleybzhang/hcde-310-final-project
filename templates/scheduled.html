<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Syncup — Scheduled!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav>
    <a href="/" class="wordmark">syncup</a>
  </nav>

  <main class="confirm-wrap">
    <div class="card center">
      <div class="check">✓</div>
      <h2>You're all set!</h2>
      <p class="muted">Invites sent to:</p>
      <ul class="email-list">
        {% for email in emails %}
          <li>{{ email }}</li>
        {% endfor %}
      </ul>
      <a href="/" class="btn-primary">Plan another →</a>
    </div>
  </main>

</body>
</html>
